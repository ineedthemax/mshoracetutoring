<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algebra 1 | MSHORACE Tutoring</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070A0F;--card:#0D1320;--brand:#1E3A5F;--mid:#2563A0;--light:#5B9BD5;--gold:#C9A84C;--gold2:#E8C96C;--text:#E7EEF8;--sub:#7A8EA8;--border:rgba(37,99,160,.25);--ok:#52C97E;--err:#E05C5C}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 10%,rgba(30,58,95,.4) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(201,168,76,.06) 0%,transparent 55%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1}
.hdr{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(7,10,15,.92);backdrop-filter:blur(14px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:11px;cursor:pointer}
.logo-mark{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--mid));border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:var(--gold)}
.logo-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;line-height:1.2}
.logo-tag{font-size:10px;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:11px;font-size:13px;color:var(--sub)}
.mbar{width:100px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.mfill{height:100%;background:linear-gradient(90deg,var(--mid),var(--gold));border-radius:3px;transition:width .5s}
.hdr-pct{color:var(--gold);font-weight:700}
.hero{padding:56px 24px 32px;text-align:center;max-width:700px;margin:0 auto}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.6rem);font-weight:900;line-height:1.1;margin-bottom:12px}
.hero h1 em{color:var(--gold);font-style:normal}
.hero p{font-size:16px;color:var(--sub);line-height:1.7;max-width:460px;margin:0 auto 32px}
.stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;margin-bottom:6px}
.stat .n{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gold);display:block}
.stat .l{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1.2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:16px;padding:24px;max-width:1160px;margin:0 auto}
.scard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.scard::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--brand),var(--gold));transform:scaleX(0);transform-origin:left;transition:transform .25s}
.scard:hover{transform:translateY(-4px);border-color:rgba(201,168,76,.4);box-shadow:0 14px 44px rgba(30,58,95,.5)}
.scard:hover::after{transform:scaleX(1)}
.scard .unit{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:5px}
.scard .ico{font-size:2.2rem;margin-bottom:9px;display:block}
.scard .title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:4px}
.scard .sub{font-size:12px;color:var(--sub);margin-bottom:16px;line-height:1.5}
.scard .prow{display:flex;align-items:center;gap:9px}
.scard .pbar{flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.scard .pfill{height:100%;background:linear-gradient(90deg,var(--mid),var(--gold));border-radius:2px;transition:width .5s}
.scard .ptxt{font-size:12px;color:var(--sub)}
.secview{max-width:760px;margin:0 auto;padding:24px}
.back{display:inline-flex;align-items:center;gap:7px;color:var(--gold);font-size:13.5px;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;margin-bottom:24px;transition:gap .2s}
.back:hover{gap:12px}
.sechdr{background:linear-gradient(135deg,var(--brand) 0%,var(--mid) 100%);border-radius:14px;padding:26px;margin-bottom:20px;position:relative;overflow:hidden}
.sechdr::after{content:attr(data-ico);position:absolute;right:22px;top:50%;transform:translateY(-50%);font-size:3.8rem;opacity:.22;pointer-events:none}
.sechdr .badge{display:inline-block;background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);color:var(--gold);font-size:10px;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:9px;font-weight:600}
.sechdr h2{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;margin-bottom:4px}
.sechdr p{color:rgba(255,255,255,.7);font-size:13.5px}
.llist{display:flex;flex-direction:column;gap:9px}
.litem{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:all .2s;position:relative;overflow:hidden}
.litem::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);transform:scaleY(0);transition:transform .2s}
.litem:hover{border-color:rgba(201,168,76,.3);background:rgba(30,58,95,.2);padding-left:24px}
.litem:hover::before{transform:scaleY(1)}
.lnum{width:32px;height:32px;border-radius:7px;background:rgba(30,58,95,.5);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--gold);flex-shrink:0}
.linfo{flex:1}
.lname{font-weight:600;font-size:14.5px;margin-bottom:2px}
.lmeta{font-size:12px;color:var(--sub)}
.crumb{padding:12px 24px;font-size:13px;color:var(--sub);display:flex;align-items:center;gap:7px;max-width:1100px;margin:0 auto;flex-wrap:wrap}
.crumb a{color:var(--gold);cursor:pointer}
.lview{max-width:1100px;margin:0 auto;padding:16px 24px 48px;display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
@media(max-width:800px){.lview{grid-template-columns:1fr}}
.lcontent{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;position:sticky;top:76px}
.lcontent h2{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--gold);margin-bottom:16px}
.lcontent h3{font-size:11px;text-transform:uppercase;letter-spacing:1.8px;color:var(--gold);margin:16px 0 6px;font-weight:600}
.lcontent p{font-size:14px;line-height:1.72;color:var(--text);margin-bottom:9px}
.rbox{background:rgba(30,58,95,.3);border:1px solid rgba(201,168,76,.28);border-left:3px solid var(--gold);border-radius:7px;padding:11px 15px;margin:12px 0;font-size:13.5px;line-height:1.6}
.ebox{background:rgba(7,10,15,.9);border:1px solid var(--border);border-radius:9px;padding:14px;margin:9px 0;font-size:13.5px}
.ebox .elabel{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:7px;font-weight:600}
.ebox .eq{font-size:15px;font-weight:600;margin-bottom:3px}
.ebox .step{color:var(--sub);margin:3px 0;line-height:1.5}
.ebox .res{color:var(--ok);font-weight:600;margin-top:6px}
.ppanel{display:flex;flex-direction:column;gap:13px}
.phead{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:20px}
.ptitle{font-size:10.5px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:2px;font-weight:600}
.psub{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700}
.pbar2{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:11px}
.pfill2{height:100%;background:linear-gradient(90deg,var(--mid),var(--gold));border-radius:2px;transition:width .5s}
.pcount{font-size:12px;color:var(--sub);margin-top:7px}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:22px;transition:border-color .2s}
.qcard.correct{border-color:var(--ok)}
.qcard.wrong{border-color:var(--err)}
.qtag{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:var(--gold);font-weight:600;margin-bottom:10px}
.qtext{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:18px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:9px;padding:11px 15px;cursor:pointer;font-size:14px;transition:all .18s;text-align:left;font-family:'DM Sans',sans-serif;color:var(--text)}
.opt:hover{border-color:var(--light);background:rgba(37,99,160,.15)}
.opt.selected{border-color:var(--mid);background:rgba(37,99,160,.2)}
.opt.correct{border-color:var(--ok);background:rgba(82,201,126,.1);color:var(--ok)}
.opt.wrong{border-color:var(--err);background:rgba(224,92,92,.1);color:var(--err)}
.feedback{margin-top:13px;padding:11px 15px;border-radius:9px;font-size:13.5px;line-height:1.6;display:none}
.feedback.show{display:block}
.feedback.ok{background:rgba(82,201,126,.1);border:1px solid rgba(82,201,126,.3);color:var(--ok)}
.feedback.bad{background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.3);color:var(--err)}
.nextbtn{margin-top:14px;background:linear-gradient(135deg,var(--brand),var(--mid));border:none;color:#fff;padding:11px 24px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:none;width:100%;transition:opacity .2s}
.nextbtn:hover{opacity:.85}
.nextbtn.show{display:block}
.done-card{background:linear-gradient(135deg,var(--brand),var(--mid));border-radius:14px;padding:36px;text-align:center;display:none}
.done-card.show{display:block}
.done-card h3{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;margin-bottom:8px}
.done-card p{color:rgba(255,255,255,.75);margin-bottom:20px}
.done-card .score{font-size:3rem;font-weight:900;color:var(--gold);font-family:'Playfair Display',serif}
.done-back{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:11px 24px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:16px}
</style>
</head>
<body>
<div id="app">
<header class="hdr">
  <div class="logo" onclick="goHome()">
    <div class="logo-mark">A1</div>
    <div><div class="logo-name">MsHorace Tutoring</div><div class="logo-tag">Algebra 1</div></div>
  </div>
  <div class="hdr-right">
    <div class="mbar"><div class="mfill" id="globalBar" style="width:0%"></div></div>
    <span class="hdr-pct" id="globalPct">0%</span>
  </div>
</header>
<div id="main"></div>
</div>
<script>
const UNITS=[
  {id:0,ico:'🔢',title:'Solving Equations',sub:'One-step, two-step, and multi-step equations',lessons:[
    {title:'One-Step Equations (Add & Subtract)',meta:'Add/Subtract operations · 5 problems',content:{
      heading:'One-Step Equations — Add & Subtract',
      intro:'To solve an equation, <strong>isolate the variable</strong> by using the opposite operation on both sides. For addition equations, subtract. For subtraction equations, add.',
      rule:'Whatever you do to one side, do to the other. Goal: get the variable alone.',
      examples:[
        {label:'x + 7 = 15',eq:'x + 7 = 15',steps:['Subtract 7 from both sides','x + 7 − 7 = 15 − 7'],res:'x = 8'},
        {label:'y − 4 = 11',eq:'y − 4 = 11',steps:['Add 4 to both sides','y − 4 + 4 = 11 + 4'],res:'y = 15'}
      ],
      problems:[
        {q:'Solve: x + 9 = 20',opts:['x = 11','x = 29','x = 9','x = 20'],ans:0,fb:'Subtract 9 from both sides: x = 20 − 9 = 11'},
        {q:'Solve: m − 6 = 14',opts:['m = 8','m = 20','m = 84','m = 6'],ans:1,fb:'Add 6 to both sides: m = 14 + 6 = 20'},
        {q:'Solve: n + 15 = 23',opts:['n = 38','n = 8','n = 15','n = 7'],ans:1,fb:'Subtract 15: n = 23 − 15 = 8'},
        {q:'Solve: p − 12 = 5',opts:['p = 7','p = 17','p = 60','p = 5'],ans:1,fb:'Add 12 to both sides: p = 5 + 12 = 17'},
        {q:'If x + 8 = 8, what is x?',opts:['x = 16','x = 64','x = 0','x = 1'],ans:2,fb:'Subtract 8: x = 8 − 8 = 0'}
      ]
    }},
    {title:'One-Step Equations (Multiply & Divide)',meta:'Multiply/Divide operations · 5 problems',content:{
      heading:'One-Step Equations — Multiply & Divide',
      intro:'When the variable is multiplied by a number, <strong>divide</strong> to isolate it. When it is divided, <strong>multiply</strong>.',
      rule:'Multiplication and division are inverse operations. Always apply the same operation to BOTH sides.',
      examples:[
        {label:'5x = 35',eq:'5x = 35',steps:['Divide both sides by 5','5x ÷ 5 = 35 ÷ 5'],res:'x = 7'},
        {label:'x ÷ 3 = 8',eq:'x ÷ 3 = 8',steps:['Multiply both sides by 3','x = 8 × 3'],res:'x = 24'}
      ],
      problems:[
        {q:'Solve: 4x = 32',opts:['x = 8','x = 28','x = 128','x = 4'],ans:0,fb:'Divide both sides by 4: x = 32 ÷ 4 = 8'},
        {q:'Solve: x ÷ 5 = 6',opts:['x = 1','x = 11','x = 30','x = 5'],ans:2,fb:'Multiply both sides by 5: x = 6 × 5 = 30'},
        {q:'Solve: 9n = 63',opts:['n = 7','n = 54','n = 72','n = 9'],ans:0,fb:'Divide both sides by 9: n = 63 ÷ 9 = 7'},
        {q:'Solve: m ÷ 7 = 4',opts:['m = 28','m = 11','m = 3','m = 47'],ans:0,fb:'Multiply both sides by 7: m = 4 × 7 = 28'},
        {q:'Solve: 12y = 60',opts:['y = 5','y = 48','y = 72','y = 6'],ans:0,fb:'Divide both sides by 12: y = 60 ÷ 12 = 5'}
      ]
    }},
    {title:'Multi-Step Equations',meta:'Two or more steps · 5 problems',content:{
      heading:'Multi-Step Equations',
      intro:'Multi-step equations require <strong>two or more operations</strong>. Always undo addition/subtraction FIRST, then multiplication/division. Combine like terms first if needed.',
      rule:'Order of steps: 1) Simplify each side 2) Undo + or − 3) Undo × or ÷',
      examples:[
        {label:'2x + 5 = 13',eq:'2x + 5 = 13',steps:['Subtract 5: 2x = 8','Divide by 2: x = 4'],res:'x = 4'},
        {label:'3x − 2 + x = 14',eq:'4x − 2 = 14',steps:['Combine like terms: 4x','Add 2: 4x = 16','Divide by 4: x = 4'],res:'x = 4'}
      ],
      problems:[
        {q:'Solve: 3x + 4 = 19',opts:['x = 5','x = 23','x = 4','x = 7'],ans:0,fb:'Subtract 4: 3x = 15. Divide by 3: x = 5'},
        {q:'Solve: 5y − 7 = 18',opts:['y = 5','y = 11','y = 2','y = 25'],ans:0,fb:'Add 7: 5y = 25. Divide by 5: y = 5'},
        {q:'Solve: 2(x + 3) = 14',opts:['x = 4','x = 7','x = 10','x = 2'],ans:0,fb:'Distribute: 2x + 6 = 14. Subtract 6: 2x = 8. Divide by 2: x = 4'},
        {q:'Solve: 4x + x = 20',opts:['x = 5','x = 4','x = 20','x = 2'],ans:1,fb:'Combine like terms: 5x = 20. Divide by 5: x = 4'},
        {q:'Solve: 6x − 3x + 2 = 11',opts:['x = 3','x = 13','x = 9','x = 4'],ans:0,fb:'Combine: 3x + 2 = 11. Subtract 2: 3x = 9. Divide by 3: x = 3'}
      ]
    }}
  ]},
  {id:1,ico:'📈',title:'Slope & Linear Equations',sub:'Calculate slope, slope-intercept form, graph lines',lessons:[
    {title:'Understanding Slope',meta:'Rise over Run · 5 problems',content:{
      heading:'Slope',
      intro:'<strong>Slope</strong> measures the steepness of a line. It equals the rise (vertical change) divided by the run (horizontal change).',
      rule:'m = (y₂ − y₁) / (x₂ − x₁) | Positive = goes up | Negative = goes down | Zero = horizontal | Undefined = vertical',
      examples:[
        {label:'Find slope through (1,2) and (4,8)',eq:'m = (8−2)/(4−1) = 6/3 = 2',steps:['Rise = 8 − 2 = 6','Run = 4 − 1 = 3'],res:'Slope = 2'},
        {label:'Find slope through (0,5) and (3,2)',eq:'m = (2−5)/(3−0) = −3/3 = −1',steps:['Rise = 2 − 5 = −3 (going down)','Run = 3'],res:'Slope = −1'}
      ],
      problems:[
        {q:'Find the slope through (0,0) and (4,8).',opts:['2','4','½','8'],ans:0,fb:'m = (8−0)/(4−0) = 8/4 = 2'},
        {q:'Find the slope through (2,3) and (6,11).',opts:['2','4','½','8'],ans:0,fb:'m = (11−3)/(6−2) = 8/4 = 2'},
        {q:'A horizontal line has slope ___.',opts:['1','−1','0','Undefined'],ans:2,fb:'Horizontal lines have zero rise, so slope = 0.'},
        {q:'A vertical line has slope ___.',opts:['0','1','−1','Undefined'],ans:3,fb:'Vertical lines have zero run. Division by zero is undefined.'},
        {q:'Find the slope through (−2,1) and (4,7).',opts:['1','2','6','3'],ans:0,fb:'m = (7−1)/(4−(−2)) = 6/6 = 1'}
      ]
    }},
    {title:'Slope-Intercept Form',meta:'y = mx + b · 5 problems',content:{
      heading:'Slope-Intercept Form: y = mx + b',
      intro:'<strong>y = mx + b</strong> is the most common form of a linear equation. <strong>m</strong> is the slope and <strong>b</strong> is the y-intercept (where the line crosses the y-axis at x = 0).',
      rule:'To graph: 1) Plot y-intercept (0, b) 2) Use slope = rise/run to find next point 3) Connect and extend',
      examples:[
        {label:'Identify slope and y-intercept: y = 3x − 5',eq:'y = 3x − 5',steps:['m = 3 (slope)','b = −5 (y-intercept)'],res:'Slope = 3, y-intercept = (0, −5)'},
        {label:'Write equation: slope = 2, y-intercept = 4',eq:'y = mx + b',steps:['Substitute m = 2, b = 4'],res:'y = 2x + 4'}
      ],
      problems:[
        {q:'In y = 5x + 3, what is the slope?',opts:['3','5','x','15'],ans:1,fb:'In y = mx + b, m = 5 is the slope.'},
        {q:'In y = −2x + 7, what is the y-intercept?',opts:['−2','2','7','−7'],ans:2,fb:'In y = mx + b, b = 7 is the y-intercept.'},
        {q:'Write the equation with slope = 4 and y-intercept = −1.',opts:['y = −x + 4','y = 4x − 1','y = 4x + 1','y = −4x + 1'],ans:1,fb:'y = mx + b: y = 4x + (−1) = 4x − 1'},
        {q:'What is the y-intercept of y = 6x?',opts:['6','1','0','−6'],ans:2,fb:'y = 6x is y = 6x + 0, so b = 0. The line passes through the origin.'},
        {q:'Which point is on the line y = 2x + 1?',opts:['(1,4)','(2,5)','(3,8)','(0,2)'],ans:1,fb:'y = 2(2) + 1 = 4 + 1 = 5. Point (2,5) is on the line. ✓'}
      ]
    }},
    {title:'Graphing Linear Equations',meta:'Plot lines from equations · 5 problems',content:{
      heading:'Graphing Linear Equations',
      intro:'Given <strong>y = mx + b</strong>, plot the y-intercept first, then use slope as rise/run to find more points. Always use at least 2 points to draw a line.',
      rule:'Slope as a fraction: rise/run. Move up (positive) or down (negative) for rise, then right for run.',
      examples:[
        {label:'Graph y = 2x + 1',eq:'y = 2x + 1',steps:['Plot y-intercept: (0,1)','Slope = 2/1: up 2, right 1 → (1,3)','Draw the line'],res:'Line through (0,1) and (1,3)'},
        {label:'Find equation from graph through (0,−3) and (2,1)',eq:'m = (1−(−3))/(2−0) = 4/2 = 2, b = −3',steps:['Calculate slope','Read y-intercept'],res:'y = 2x − 3'}
      ],
      problems:[
        {q:'What is the y-intercept of y = 4x − 6?',opts:['4','−6','6','0'],ans:1,fb:'In y = mx + b, b = −6. Y-intercept is (0, −6).'},
        {q:'A line has slope ½ and y-intercept 3. Its equation is:',opts:['y = 3x + ½','y = ½x + 3','y = ½x − 3','y = 2x + 3'],ans:1,fb:'y = mx + b: y = ½x + 3'},
        {q:'Which point is on the line y = 3x − 2?',opts:['(2,4)','(1,1)','(0,3)','(2,5)'],ans:1,fb:'y = 3(1) − 2 = 1. Point (1,1) ✓'},
        {q:'Two lines are parallel if they have:',opts:['Same y-intercept','Same slope','No slope','Opposite slopes'],ans:1,fb:'Parallel lines have the same slope but different y-intercepts.'},
        {q:'Find the x-intercept of y = 3x − 9.',opts:['(0,−9)','(3,0)','(9,0)','(0,3)'],ans:1,fb:'Set y = 0: 0 = 3x − 9, 3x = 9, x = 3. X-intercept: (3, 0)'}
      ]
    }}
  ]},
  {id:2,ico:'⚖️',title:'Inequalities & Systems',sub:'Solve inequalities and systems of equations',lessons:[
    {title:'Solving & Graphing Inequalities',meta:'Inequality symbols and number lines · 5 problems',content:{
      heading:'Inequalities',
      intro:'Inequalities are solved like equations, except: <strong>when you multiply or divide by a NEGATIVE number, flip the inequality sign!</strong>',
      rule:'> greater than (open circle) | < less than (open circle) | ≥ greater than or equal to (closed circle) | ≤ less than or equal to (closed circle)',
      examples:[
        {label:'Solve: 3x + 2 < 14',eq:'3x + 2 < 14',steps:['Subtract 2: 3x < 12','Divide by 3: x < 4','Open circle at 4, shade left'],res:'x < 4'},
        {label:'Solve: −2x ≥ 10',eq:'−2x ≥ 10',steps:['Divide by −2 → FLIP the sign!','x ≤ −5','Closed circle at −5, shade left'],res:'x ≤ −5'}
      ],
      problems:[
        {q:'Solve: x + 4 > 9',opts:['x > 13','x > 5','x < 5','x = 5'],ans:1,fb:'Subtract 4: x > 9 − 4 = 5'},

let cur={unit:null,lesson:null,qIdx:0,score:0,answered:false};
const progress={};
UNITS.forEach(u=>u.lessons.forEach((l,li)=>progress[`${u.id}-${li}`]=0));

function totalProblems(){return UNITS.reduce((a,u)=>a+u.lessons.reduce((b,l)=>b+l.content.problems.length,0),0);}
function totalDone(){return Object.values(progress).reduce((a,v)=>a+v,0);}
function updateGlobal(){const pct=Math.round(totalDone()/totalProblems()*100);document.getElementById('globalBar').style.width=pct+'%';document.getElementById('globalPct').textContent=pct+'%';try{localStorage.setItem('a1progress',JSON.stringify(progress));}catch(e){}}

function goHome(){cur={unit:null,lesson:null,qIdx:0,score:0,answered:false};render();}

function render(){
  const app=document.getElementById('main');
  if(cur.unit===null)renderHome(app);
  else if(cur.lesson===null)renderSection(app);
  else renderLesson(app);
  updateGlobal();
}

function renderHome(app){
  const done=totalDone(),total=totalProblems();
  app.innerHTML=`
  <div class="hero">
    <h1>Master <em>Algebra 1</em><br>One Concept at a Time</h1>
    <p>8 sections · 16 lessons · 80 practice problems with instant feedback</p>
    <div class="stats">
      <div class="stat"><span class="n">8</span><span class="l">Sections</span></div>
      <div class="stat"><span class="n">80</span><span class="l">Problems</span></div>
      <div class="stat"><span class="n">${done}</span><span class="l">Completed</span></div>
    </div>
  </div>
  <div class="grid">${UNITS.map(u=>{
    const uDone=u.lessons.reduce((a,l,li)=>a+progress[`${u.id}-${li}`],0);
    const uTotal=u.lessons.reduce((a,l)=>a+l.content.problems.length,0);
    const pct=uTotal?Math.round(uDone/uTotal*100):0;
    return`<div class="scard" onclick="openUnit(${u.id})">
      <div class="unit">Section ${u.id+1}</div>
      <div class="ico">${u.ico}</div>
      <div class="title">${u.title}</div>
      <div class="sub">${u.sub}</div>
      <div class="prow"><div class="pbar"><div class="pfill" style="width:${pct}%"></div></div><span class="ptxt">${pct}%</span></div>
    </div>`;
  }).join('')}</div>`;
}

function openUnit(id){cur.unit=id;cur.lesson=null;render();}

      const done=progress[`${u.id}-${li}`],total=l.content.problems.length;
      return`<div class="litem" onclick="openLesson(${li})">
        <div class="lnum">${done===total&&total>0?'✓':li+1}</div>
        <div class="linfo"><div class="lname">${l.title}</div><div class="lmeta">${l.meta} · ${done}/${total} done</div></div>
        <div style="color:var(--gold);font-size:12px">${done===total&&total>0?'Complete':'→'}</div>
      </div>`;
    }).join('')}</div>
  </div>`;
}

function openLesson(li){cur.lesson=li;cur.qIdx=0;cur.score=0;cur.answered=false;render();}

function renderLesson(app){
  const u=UNITS[cur.unit],l=u.lessons[cur.lesson],c=l.content;
  const done=progress[`${cur.unit}-${cur.lesson}`],total=c.problems.length;
  app.innerHTML=`
  <div class="crumb"><a onclick="goHome()">Home</a> › <a onclick="openUnit(${cur.unit})">${u.title}</a> › ${l.title}</div>
  <div class="lview">
    <div class="lcontent">
      <h2>${c.heading}</h2>
      <p>${c.intro}</p>
      <div class="rbox">${c.rule}</div>
      ${c.examples.map(e=>`<div class="ebox">
        <div class="elabel">${e.label}</div>
        <div class="eq">${e.eq}</div>
        ${e.steps.map(s=>`<div class="step">→ ${s}</div>`).join('')}
        ${e.res?`<div class="res">✓ ${e.res}</div>`:''}
      </div>`).join('')}
    </div>
    <div class="ppanel">
      <div class="phead">
        <div class="ptitle">Practice Problems</div>
        <div class="psub">${l.title}</div>
        <div class="pbar2"><div class="pfill2" id="pbar" style="width:${done/total*100}%"></div></div>
        <div class="pcount" id="pcount">${done} of ${total} completed</div>
      </div>
      <div id="qzone"></div>
      <div class="done-card" id="doneCard">
        <h3>🎉 Section Complete!</h3>
        <div class="score" id="scoreDisplay"></div>
        <p id="scoreMsg"></p>
        <button class="done-back" onclick="openUnit(${cur.unit})">← Back to Section</button>
      </div>
    </div>
  </div>`;
  renderQ();
}

function renderQ(){
  const c=UNITS[cur.unit].lessons[cur.lesson].content;
  if(cur.qIdx>=c.problems.length){
    document.getElementById('qzone').style.display='none';
    const dc=document.getElementById('doneCard');dc.classList.add('show');
    const pct=Math.round(cur.score/c.problems.length*100);
    document.getElementById('scoreDisplay').textContent=pct+'%';
    document.getElementById('scoreMsg').textContent=pct>=80?'Great job! You have mastered this lesson.':pct>=60?'Good effort! Review the explanations and try again.':'Keep practicing — you\'ve got this!';
    return;
  }
  const p=c.problems[cur.qIdx];
  document.getElementById('qzone').innerHTML=`
  <div class="qcard" id="qcard">
    <div class="qtag">Question ${cur.qIdx+1} of ${c.problems.length}</div>
    <div class="qtext">${p.q}</div>
    <div class="opts">${p.opts.map((o,i)=>`<button class="opt" onclick="answer(${i})" id="opt${i}">${o}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div>
    <button class="nextbtn" id="nextBtn" onclick="nextQ()">${cur.qIdx+1<c.problems.length?'Next Question →':'See Results'}</button>
  </div>`;
}

function answer(i){
  if(cur.answered)return;
  cur.answered=true;
  const p=UNITS[cur.unit].lessons[cur.lesson].content.problems[cur.qIdx];
  const correct=i===p.ans;
  if(correct)cur.score++;
  document.getElementById('opt'+i).classList.add(correct?'correct':'wrong');
  if(!correct)document.getElementById('opt'+p.ans).classList.add('correct');
  document.querySelectorAll('.opt').forEach(o=>o.style.pointerEvents='none');
  const fb=document.getElementById('fb');
  fb.textContent=(correct?'✓ Correct! ':'✗ Not quite. ')+p.fb;
  fb.className='feedback show '+(correct?'ok':'bad');
  document.getElementById('nextBtn').classList.add('show');
  progress[`${cur.unit}-${cur.lesson}`]=cur.qIdx+1;
  updateGlobal();
  const pb=document.getElementById('pbar');if(pb)pb.style.width=((cur.qIdx+1)/p.opts.length*100)+'%';
  const pc=document.getElementById('pcount');if(pc)pc.textContent=`${cur.qIdx+1} of ${UNITS[cur.unit].lessons[cur.lesson].content.problems.length} completed`;
}

function nextQ(){cur.qIdx++;cur.answered=false;renderQ();}

try{const s=localStorage.getItem('a1progress');if(s)Object.assign(progress,JSON.parse(s));}catch(e){}
render();
</script>
</body>
</html>
